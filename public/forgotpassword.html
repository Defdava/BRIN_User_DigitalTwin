<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Parking | Lupa Kata Sandi</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/Digital-Twin-Website-used/blob/575171d0e9964327d99950733c2b48cea0c59d72/logo-brin.png?raw=true">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #0B192C;
            --accent-red: #E63946;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --bg-dark: #070F19;
            --glass-bg: rgba(15, 32, 54, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: blur(16px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: fixed;
            width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
            top: 15%; right: -150px;
            z-index: -1; pointer-events: none; filter: blur(50px);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center center;
            z-index: -2; animation: slideshow 20s infinite;
            opacity: 0.25; filter: contrast(105%) brightness(85%);
        }

        @keyframes slideshow {
            0% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.25; }
            15% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.25; }
            20% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0; }
            20.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            35% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0.25; }
            40% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            40.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            55% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0.25; }
            60% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            60.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            75% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0.25; }
            80% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            80.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
            95% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0.25; }
            100% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
        }

        header {
            background: rgba(11, 25, 44, 0.8);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 24px; height: 72px; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 40px; width: auto; filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.1)); }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
            background: linear-gradient(90deg, #FFFFFF 0%, #E2E8F0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-subtitle { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-top: -2px; }
        
        .header-right { background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .header-right span { font-size: 13px; font-weight: 600; color: #E2E8F0; }

        .forgot-container {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 100px 20px 40px;
        }

        .welcome-message {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 24px;
            background: linear-gradient(90deg, #FFFFFF 30%, var(--text-secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .forgot-box {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 40px 32px; border-radius: 20px; width: 100%; max-width: 400px;
            border: 1px solid var(--glass-border); box-shadow: 0 16px 40px var(--glass-shadow);
        }

        .forgot-box h2 { margin: 0 0 24px; text-align: center; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 700; color: white; letter-spacing: 1px; }

        input {
            width: 100%; padding: 14px 16px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            background: rgba(11, 25, 44, 0.6); color: white; font-size: 14px; font-family: inherit;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2); transition: all 0.3s ease; box-sizing: border-box;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.35); }
        input:focus { outline: none; border-color: var(--accent-red); box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2); background: rgba(11, 25, 44, 0.8); }

        button {
            width: 100%; background: linear-gradient(135deg, var(--accent-red) 0%, #D62828 100%);
            color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3); transition: all 0.3s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(230, 57, 70, 0.4); background: linear-gradient(135deg, #FF4D5A 0%, #E63946 100%); }

        .forgot-box a { display: block; margin-top: 24px; text-align: center; font-size: 13.5px; color: #94A3B8; text-decoration: none; transition: color 0.3s; }
        .forgot-box a:hover { color: white; text-decoration: underline; }

        #error-message {
            position: fixed; top: 24px; right: 24px; padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 2000; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            pointer-events: none; opacity: 0; transform: translateY(-50px); color: white;
        }
        #error-message.show { opacity: 1; transform: translateY(0); }

        /* Interactive Tour */
        .tour-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.65); backdrop-filter: blur(2px); z-index: 2000; pointer-events: auto;
        }

        .tour-tooltip {
            position: absolute; background: rgba(11, 25, 44, 0.95); backdrop-filter: var(--glass-blur);
            border: 1.5px solid rgba(230, 57, 70, 0.5); border-radius: 16px; padding: 20px; max-width: 320px;
            text-align: center; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); z-index: 2001; color: white;
        }
        .tour-tooltip h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; margin-bottom: 8px; }
        .tour-tooltip p { font-size: 13.5px; color: #CBD5E1; margin-bottom: 16px; line-height: 1.6; }
        .tour-tooltip .tour-buttons { display: flex; justify-content: center; gap: 12px; }
        .tour-tooltip button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; }
        .tour-tooltip .next-btn { background-color: var(--accent-red); color: white; }
        .tour-tooltip .next-btn:hover { background-color: var(--accent-red-hover); }
        .tour-tooltip .close-btn { background-color: rgba(255, 255, 255, 0.08); color: #E2E8F0; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tour-tooltip .close-btn:hover { background-color: rgba(255, 255, 255, 0.15); color: white; }
        
        .tour-tooltip::after { content: ""; position: absolute; border: 8px solid transparent; pointer-events: none; }
        .tour-tooltip.right::after { border-right-color: var(--accent-red); left: -16px; top: 50%; transform: translateY(-50%); }
        .tour-tooltip.left::after { border-left-color: var(--accent-red); right: -16px; top: 50%; transform: translateY(-50%); }
        .tour-tooltip.top::after { border-top-color: var(--accent-red); bottom: -16px; left: 50%; transform: translateX(-50%); }
        .tour-tooltip.bottom::after { border-bottom-color: var(--accent-red); top: -16px; left: 50%; transform: translateX(-50%); }
        .tour-tooltip.center::after { display: none; }

        @media (max-width: 768px) {
            header { padding: 0 16px; height: 64px; }
            .logo img { height: 32px; }
            .logo-title { font-size: 15px; }
            .logo-subtitle { display: none; }
            .header-right { padding: 6px 12px; }
            .header-right span { font-size: 11px; }
            .welcome-message { font-size: 20px; }
            .forgot-box { padding: 32px 24px; }
            #error-message { top: 76px; right: 16px; left: 16px; transform: translateX(0); text-align: center; }
            .tour-tooltip { max-width: 90%; left: 5% !important; right: 5% !important; top: 50% !important; transform: translateY(-50%) !important; position: fixed; }
            .tour-tooltip::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <header>
        <div class="logo">
            <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
            <div class="logo-text">
                <span class="logo-title">BRIN</span>
                <span class="logo-subtitle">Badan Riset dan Inovasi Nasional</span>
            </div>
        </div>
        <div class="header-right">
            <span>Operator System</span>
        </div>
    </header>

    <div class="forgot-container">
        <div class="welcome-message">Lupa Kata Sandi?</div>
        
        <div class="forgot-box">
            <div id="forgotFormSection">
                <h2>Bantuan Akses Akun</h2>
                <form id="forgotForm">
                    <input type="email" placeholder="Alamat Email Anda" id="forgotEmail" required>
                    <button type="submit">Dapatkan Sandi Sementara</button>
                    <a href="/login.html">Kembali ke Halaman Login</a>
                </form>
            </div>
            
            <div id="resetFormSection" style="display: none;">
                <h2>Atur Ulang Kata Sandi</h2>
                <form id="resetForm">
                    <input type="password" placeholder="Kata Sandi Baru" id="newPassword" required>
                    <input type="password" placeholder="Konfirmasi Kata Sandi Baru" id="confirmPassword" required>
                    <button type="submit">Simpan Kata Sandi</button>
                    <a href="/login.html">Kembali ke Halaman Login</a>
                </form>
            </div>
        </div>
        
        <div id="error-message"></div>
        
        <div class="tour-overlay" id="tourOverlay"></div>
        <div class="tour-tooltip" id="tourTooltip" style="display: none;">
            <h3 id="tooltipTitle"></h3>
            <p id="tooltipText"></p>
            <div class="tour-buttons">
                <button class="next-btn" id="tourNextBtn">Lanjut</button>
                <button class="close-btn" id="tourCloseBtn">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        class AuthSystem {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('users')) || [];
            }
            findUserByEmail(email) {
                return this.users.find(u => u.email === email);
            }
            updatePassword(email, newPassword) {
                const userIndex = this.users.findIndex(u => u.email === email);
                if (userIndex !== -1) {
                    this.users[userIndex].password = newPassword;
                    localStorage.setItem('users', JSON.stringify(this.users));
                    return true;
                }
                return false;
            }
        }

        const auth = new AuthSystem();

        function showError(message, isSuccess = false) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.style.background = isSuccess ? 'rgba(16, 185, 129, 0.95)' : 'rgba(230, 57, 70, 0.95)';
            errorElement.classList.add("show");
            setTimeout(() => { errorElement.classList.remove("show"); }, 5000);
        }

        // === TOUR ===
        const tourSteps = [
            { element: 'header', title: "Header Utama", text: "Menampilkan logo resmi BRIN dan nama portal sistem operator.", position: 'bottom' },
            { element: '.forgot-box', title: "Formulir Lupa Sandi", text: "Masukkan email Anda yang terdaftar untuk mendapatkan akses sementara, lalu atur ulang sandi Anda.", position: 'center' }
        ];

        let currentTourStep = 0;

        function startTour() {
            document.getElementById('tourOverlay').style.display = 'block';
            showTooltip(currentTourStep);
        }

        function showTooltip(step) {
            const tooltip = document.getElementById('tourTooltip');
            const title = document.getElementById('tooltipTitle');
            const text = document.getElementById('tooltipText');
            const nextBtn = document.getElementById('tourNextBtn');
            const targetElement = document.querySelector(tourSteps[step].element);
            
            if (!targetElement) { endTour(); return; }

            title.textContent = tourSteps[step].title;
            text.textContent = tourSteps[step].text;
            tooltip.style.display = 'block';
            tooltip.className = 'tour-tooltip ' + tourSteps[step].position;

            const rect = targetElement.getBoundingClientRect();
            const isMobile = window.innerWidth <= 768;

            if (!isMobile) {
                let left, top;
                const tooltipWidth = 320;
                const tooltipHeight = 160;
                
                switch (tourSteps[step].position) {
                    case 'center':
                        left = (window.innerWidth - tooltipWidth) / 2;
                        top = (window.innerHeight - tooltipHeight) / 2;
                        break;
                    case 'bottom':
                        left = rect.left + (rect.width / 2) - (tooltipWidth / 2);
                        top = rect.bottom + 16;
                        break;
                }
                tooltip.style.left = `${left}px`;
                tooltip.style.top = `${top}px`;
            }

            nextBtn.textContent = step === tourSteps.length - 1 ? 'Selesai' : 'Lanjut';
        }

        function endTour() {
            document.getElementById('tourOverlay').style.display = 'none';
            document.getElementById('tourTooltip').style.display = 'none';
            currentTourStep = 0;
            localStorage.setItem('tourCompleted_forgot', 'true');
        }

        // === EVENT BINDING ===
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('currentUser')) {
                window.location.replace('/index.html');
                return;
            }

            document.getElementById('forgotForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value.trim();
                const user = auth.findUserByEmail(email);

                if (!user) {
                    showError('Email tidak terdaftar. Harap periksa kembali atau buat akun baru.');
                    return;
                }

                showError(`Kata sandi sementara Anda adalah: ${user.password}. Silakan atur ulang kata sandi di bawah ini.`, true);
                document.getElementById('forgotFormSection').style.display = 'none';
                document.getElementById('resetFormSection').style.display = 'block';
            });

            document.getElementById('resetForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value.trim();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showError('Kata sandi tidak cocok. Harap periksa kembali penulisan Anda.');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showError('Kata sandi baru harus minimal 6 karakter.');
                    return;
                }

                if (auth.updatePassword(email, newPassword)) {
                    showError('Kata sandi berhasil diubah! Mengarahkan ke halaman login...', true);
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } else {
                    showError('Terjadi kesalahan saat mengatur ulang kata sandi.');
                }
            });

            document.getElementById('tourNextBtn').addEventListener('click', () => {
                currentTourStep++;
                if (currentTourStep < tourSteps.length) showTooltip(currentTourStep);
                else endTour();
            });

            document.getElementById('tourCloseBtn').addEventListener('click', endTour);

            if (localStorage.getItem('tourCompleted_forgot') !== 'true') {
                setTimeout(startTour, 1000);
            }
        });
    </script>
</body>
</html>
