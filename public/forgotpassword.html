<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Forgot Password</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/main/public/logo-brin.png?raw=true">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0B192C;
            --accent-red: #E63946;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --bg-dark: #070F19;
            --glass-bg: rgba(15, 32, 54, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif; color: var(--text-primary); background-color: var(--bg-dark);
            overflow-x: hidden; font-size: 16px; min-height: 100vh; line-height: 1.5;
        }

        .ambient-glow { position: fixed; width: 450px; height: 450px; background: radial-gradient(circle, rgba(230, 57, 70, 0.07) 0%, rgba(0, 0, 0, 0) 70%); top: 15%; right: -150px; z-index: -1; pointer-events: none; filter: blur(50px); }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center center; background-repeat: no-repeat; z-index: -2; animation: slideshow 20s infinite; opacity: 0.25; filter: contrast(105%) brightness(85%); }

        @keyframes slideshow {
            0%, 15% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.25; }
            20% { opacity: 0; }
            20.01%, 35% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0.25; }
            40% { opacity: 0; }
            40.01%, 55% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0.25; }
            60% { opacity: 0; }
            60.01%, 75% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0.25; }
            80% { opacity: 0; }
            80.01%, 95% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0.25; }
            100% { opacity: 0; }
        }

        header { background: rgba(11, 25, 44, 0.8); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--glass-border); color: white; padding: 0 24px; height: 72px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 40px; filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.1)); }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 800; background: linear-gradient(90deg, #FFFFFF 0%, #E2E8F0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-subtitle { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; margin-top: -2px; }
        .header-right { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .header-right span { font-size: 13px; font-weight: 600; color: #E2E8F0; }

        .forgot-container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 100px 20px 40px; }
        .forgot-box { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 32px 32px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 12px 40px var(--glass-shadow); border: 1px solid var(--glass-border); }
        .forgot-box h2 { margin: 0 0 24px; color: white; font-size: 22px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; }
        .forgot-box input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; background: rgba(11, 25, 44, 0.6); color: white; font-size: 14px; font-family: inherit; box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2); transition: all 0.3s ease; }
        .forgot-box input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .forgot-box input:focus { outline: none; border-color: var(--accent-red); box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2); background: rgba(11, 25, 44, 0.8); }

        .forgot-box button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-red) 0%, #D62828 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; margin: 8px 0 16px; transition: all 0.3s ease; font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3); }
        .forgot-box button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4); background: linear-gradient(135deg, #FF4D5A 0%, #E63946 100%); }
        .forgot-box a { display: inline-block; margin: 8px 0; color: #CBD5E1; text-decoration: none; font-size: 13.5px; transition: all 0.3s; font-weight: 500; }
        .forgot-box a:hover { color: white; transform: translateX(2px); }

        /* Toast Messages */
        #message-toast { position: fixed; top: 24px; right: 24px; left: auto; transform: translateY(-50px); padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2002; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.4s ease, opacity 0.4s ease; pointer-events: none; opacity: 0; color: white; text-align: left; }
        #message-toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            header { padding: 0 16px; height: 64px; } .logo { gap: 8px; } .logo img { height: 32px; } .logo-title { font-size: 15px; } .logo-subtitle { display: none; }
            .forgot-box { padding: 24px 20px; } .forgot-box h2 { font-size: 18px; } #message-toast { top: 76px; right: 16px; left: 16px; transform: translateX(0) !important; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div id="message-toast"></div>

    <header>
        <div class="logo">
            <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
            <div class="logo-text">
                <span class="logo-title">BRIN</span>
                <span class="logo-subtitle">Badan Riset dan Inovasi Nasional</span>
            </div>
        </div>
        <div class="header-right">
            <span>Parking Management System</span>
        </div>
    </header>

    <div class="forgot-container">
        <div class="forgot-box">
            <!-- Forgot Password Form -->
            <div id="forgotFormSection">
                <h2>Lupa Password</h2>
                <form id="forgotForm">
                    <input type="email" placeholder="Masukkan Email Anda" id="forgotEmail" required>
                    <button type="submit">Dapatkan Password Sementara</button>
                    <a href="login.html">Kembali ke halaman Login</a>
                </form>
            </div>

            <!-- Reset Password Form -->
            <div id="resetFormSection" style="display: none;">
                <h2>Atur Ulang Password</h2>
                <form id="resetForm">
                    <input type="password" placeholder="Password Baru" id="newPassword" required>
                    <input type="password" placeholder="Konfirmasi Password Baru" id="confirmPassword" required>
                    <button type="submit">Simpan Password</button>
                    <a href="login.html">Batal & Kembali ke Login</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        // === MOCK AUTH SYSTEM (SESUAI BAWAAN USER) ===
        class AuthSystem {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('users')) || [];
            }
            findUserByEmail(email) {
                return this.users.find(u => u.email === email);
            }
            updatePassword(email, newPassword) {
                const userIndex = this.users.findIndex(u => u.email === email);
                if (userIndex !== -1) {
                    this.users[userIndex].password = newPassword;
                    localStorage.setItem('users', JSON.stringify(this.users));
                    return true;
                }
                return false;
            }
        }

        const auth = new AuthSystem();

        function showMessage(type, message) {
            const el = document.getElementById('message-toast');
            el.textContent = message;
            el.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.95)' : 'rgba(230, 57, 70, 0.95)';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('currentUser')) {
                window.location.replace('index.html');
                return;
            }

            const forgotForm = document.getElementById('forgotForm');
            const resetForm = document.getElementById('resetForm');
            const forgotSection = document.getElementById('forgotFormSection');
            const resetSection = document.getElementById('resetFormSection');
            let currentEmail = '';

            forgotForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value.trim();
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    return showMessage('error', 'Masukkan email yang valid!');
                }

                const user = auth.findUserByEmail(email);
                if (!user) {
                    return showMessage('error', 'Email tidak ditemukan. Silakan registrasi terlebih dahulu.');
                }

                currentEmail = email;
                showMessage('success', `Password sementara: ${user.password}. Gunakan untuk mereset di bawah ini.`);
                forgotSection.style.display = 'none';
                resetSection.style.display = 'block';
            });

            resetForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const newPass = document.getElementById('newPassword').value;
                const confirmPass = document.getElementById('confirmPassword').value;

                if (newPass !== confirmPass) {
                    return showMessage('error', 'Password tidak cocok!');
                }
                if (newPass.length < 6) {
                    return showMessage('error', 'Password harus terdiri dari minimal 6 karakter!');
                }

                if (auth.updatePassword(currentEmail, newPass)) {
                    showMessage('success', 'Password berhasil diubah! Mengalihkan ke halaman login...');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showMessage('error', 'Gagal mengatur ulang password. Silakan coba lagi.');
                }
            });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && ['z', 'y', 'Z', 'Y'].includes(e.key)) e.preventDefault();
            });
            history.replaceState(null, null, window.location.href);
            window.addEventListener('popstate', () => history.replaceState(null, null, window.location.href));
        });
    </script>
</body>
</html>
