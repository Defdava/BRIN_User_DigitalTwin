<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BRIN Login</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/main/public/logo-brin.png?raw=true">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0B192C;
            --accent-red: #E63946;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --bg-dark: #070F19;
            
            /* Glassmorphism */
            --glass-bg: rgba(15, 32, 54, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif; color: var(--text-primary); background-color: var(--bg-dark);
            overflow-x: hidden; font-size: 16px; min-height: 100vh; line-height: 1.5;
        }

        /* Ambient Glow Highlights */
        .ambient-glow {
            position: fixed; width: 450px; height: 450px; background: radial-gradient(circle, rgba(230, 57, 70, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
            top: 15%; right: -150px; z-index: -1; pointer-events: none; filter: blur(50px);
        }

        /* Animasi Background Slideshow */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center center; background-repeat: no-repeat;
            z-index: -2; animation: slideshow 20s infinite; opacity: 0.25; filter: contrast(105%) brightness(85%);
        }

        @keyframes slideshow {
            0% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.25; }
            15% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0.25; }
            20% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin1.jpg?raw=true'); opacity: 0; }
            20.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            35% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0.25; }
            40% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin3.jpg?raw=true'); opacity: 0; }
            40.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            55% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0.25; }
            60% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin2.jpg?raw=true'); opacity: 0; }
            60.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            75% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0.25; }
            80% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin4.jpg?raw=true'); opacity: 0; }
            80.01% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
            95% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0.25; }
            100% { background-image: url('https://github.com/Defdava/Digital-Twin-Website-used/blob/e93ccec33c490658c360964197ea2bc52b9ec83a/fotobrin.jpg?raw=true'); opacity: 0; }
        }

        /* Sticky Glassmorphic Header */
        header {
            background: rgba(11, 25, 44, 0.8); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border); color: white; padding: 0 24px; height: 72px; display: flex;
            justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo { display: flex; align-items: center; gap: 12px; }
        .logo img { height: 40px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.1)); }
        
        .logo-text { display: flex; flex-direction: column; }
        .logo-title {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px;
            background: linear-gradient(90deg, #FFFFFF 0%, #E2E8F0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-subtitle { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-top: -2px; }

        .header-right { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .header-right span { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #E2E8F0; }

        /* Auth Container */
        .login-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; padding: 100px 20px 40px;
        }

        .welcome-message {
            color: white; font-size: 26px; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center; margin-bottom: 24px; text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            background: linear-gradient(90deg, #FFFFFF 0%, #CBD5E1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .login-box {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 32px 32px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 12px 40px var(--glass-shadow); border: 1px solid var(--glass-border);
        }

        .login-box h2 {
            margin: 0 0 24px; color: white; font-size: 22px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
        }

        .login-box input {
            width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px;
            background: rgba(11, 25, 44, 0.6); color: white; font-size: 14px; font-family: inherit; box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2); transition: all 0.3s ease;
        }
        .login-box input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .login-box input:focus { outline: none; border-color: var(--accent-red); box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2); background: rgba(11, 25, 44, 0.8); }

        .login-box button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-red) 0%, #D62828 100%); color: white;
            border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; margin: 8px 0 16px;
            transition: all 0.3s ease; font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3);
        }
        .login-box button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4); background: linear-gradient(135deg, #FF4D5A 0%, #E63946 100%); }

        .login-box a {
            display: inline-block; margin: 8px 0; color: #CBD5E1; text-decoration: none; font-size: 13.5px; transition: all 0.3s; font-weight: 500;
        }
        .login-box a:hover { color: white; transform: translateX(2px); }

        /* Toast Messages */
        #error-message {
            position: fixed; top: 24px; right: 24px; left: auto; transform: translateY(-50px); padding: 14px 24px;
            border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 2002; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.4s ease, opacity 0.4s ease;
            pointer-events: none; opacity: 0; color: white; text-align: left;
        }
        #error-message.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            header { padding: 0 16px; height: 64px; }
            .logo { gap: 8px; }
            .logo img { height: 32px; }
            .logo-title { font-size: 15px; }
            .logo-subtitle { display: none; }
            .header-right { padding: 6px 12px; }
            .header-right span { font-size: 11px; }

            .welcome-message { font-size: 20px; margin-bottom: 20px; }
            .login-box { padding: 24px 20px; }
            .login-box h2 { font-size: 18px; }
            #error-message { top: 76px; right: 16px; left: 16px; transform: translateX(0) !important; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div id="error-message"></div>

    <header>
        <div class="logo">
            <img src="https://github.com/Defdava/BRIN_Operator_DigitalTwin/blob/46a20c237c763bc2ccd436c332785427771eea05/public/brin_logo.png?raw=true" alt="BRIN Logo">
            <div class="logo-text">
                <span class="logo-title">BRIN</span>
                <span class="logo-subtitle">Badan Riset dan Inovasi Nasional</span>
            </div>
        </div>
        <div class="header-right">
            <span>Parking Management System</span>
        </div>
    </header>

    <div class="login-container">
        <div class="welcome-message">Welcome to BRIN Parking System</div>
        <div class="login-box">
            <h2>LOGIN</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <a href="forgotpassword.html" style="text-align: right; display: block; margin-top: -4px;">Lupa Password?</a>
                <button type="submit">Sign In</button>
                <a href="register.html">Belum punya akun? Mendaftar di sini</a>
            </form>
        </div>
    </div>

    <script>
        // === MOCK AUTH SYSTEM (SESUAI BAWAAN USER) ===
        class User {
            constructor(username, email, password, idWorker, profilePic = '/assets/user.JPG') {
                this.username = username;
                this.email = email;
                this.password = password;
                this.idWorker = idWorker;
                this.profilePic = profilePic;
            }
        }

        class AuthSystem {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('users')) || [];
            }
            login(email, password) {
                const user = this.users.find(u => u.email === email && u.password === password);
                if (!user) throw new Error('Email atau password tidak valid!');
                return user;
            }
        }

        const auth = new AuthSystem();

        // Fitur Toast Message
        function showError(message, isSuccess = false) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.style.background = isSuccess ? 'rgba(16, 185, 129, 0.95)' : 'rgba(230, 57, 70, 0.95)';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Redirect jika sudah login
            if (localStorage.getItem('currentUser')) {
                window.location.replace('index.html');
                return;
            }

            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;

                if (!email || !password) {
                    showError('Harap isi semua bidang.');
                    return;
                }

                try {
                    const user = auth.login(email, password);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    showError('Login berhasil! Mengalihkan...', true);
                    setTimeout(() => window.location.replace('index.html'), 1000);
                } catch (error) {
                    showError(error.message);
                }
            });

            // Prevent undo/redo shortcut
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && ['z', 'y', 'Z', 'Y'].includes(e.key)) e.preventDefault();
            });

            // Prevent back navigation loop
            history.replaceState(null, null, window.location.href);
            window.addEventListener('popstate', () => history.replaceState(null, null, window.location.href));
        });
    </script>
</body>
</html>
